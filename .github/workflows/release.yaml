# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Release gate: tests must pass before a GitHub Release is created/published.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v0.1.0). Leave empty when running on an existing tag push."
        required: false
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run all discovered tests (*/tests/test-*.sh)
        run: bash scripts/run-tests.sh

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            echo "ERROR: set inputs.tag for workflow_dispatch, or push a v* tag" >&2
            exit 1
          fi
          if [[ ! "${TAG}" =~ ^v[0-9] ]]; then
            echo "ERROR: tag must look like v0.1.0 (got: ${TAG})" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            git fetch --tags --force
            if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
              git tag "${TAG}"
              git push origin "refs/tags/${TAG}"
            fi
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes
          fi
