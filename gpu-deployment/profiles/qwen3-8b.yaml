# Distr → Deployment → App Config → Helm Values (full replace).
#
# Weights: Qwen/Qwen3-8B-FP8
# Distr UI (not in this file): namespace sglang, operation-timeout-minutes 120, served-model qwen3-8b
# NodePorts 30003–30006 — four workers, one GPU each (tp=1).
# Distr Hub Secrets: WORKER_API_KEY (from api-gateway dashboard), DD_API_KEY (Datadog Agent)
# Chart version: 0.10.0+ (digest-pinned worker image + automatic pre-pull)
# Host bootstrap: ./dependencies.sh

images:
  distrPullSecret:
    enabled: true

datadog:
  enabled: true
  worker:
    env: sglang
    service: sglang-worker-qwen3-8b
  datadog:
    apiKeyExistingSecret: datadog-secret
    site: datadoghq.com

worker:
  progressDeadlineSeconds: 7200
  hostIPC: true
  profile: local
  auth:
    enabled: true
  service:
    type: NodePort
  image:
    repository: registry.distr.sh/subconscious/timrun
    tag: sm_89-v2
    pullPolicy: IfNotPresent
    prePull:
      enabled: true
  servedModelName: qwen3-8b
  modelPath: /models/hf/Qwen3-8B-FP8
  contextLength: 16384
  gpu:
    enabled: true
    count: 1
  discoveryLabels:
    subconscious.dev/worker-pool: g2-l4-qwen3-8b
  spreadAcrossNodes: false
  strategy:
    type: Recreate
  terminationGracePeriodSeconds: 180
  sglang:
    enableMetrics: true
    enableMfuMetrics: true
    memFractionStatic: "0.85"
    maxRunningRequests: "32"
    maxTotalTokens: "32768"
    chunkedPrefillSize: "4096"
    extraArgs: >-
      --tp-size 1
      --model-impl sglang
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --trust-remote-code
      --subconscious-x-mode
      --page-size 1
  modelDownload:
    enabled: true
    hfRepo: Qwen/Qwen3-8B-FP8
    targetPath: /models/hf/Qwen3-8B-FP8
  extraEnv:
    - name: SGLANG_ENABLE_FP8
      value: "true"
    - name: NCCL_P2P_DISABLE
      value: "1"
    - name: NCCL_IB_DISABLE
      value: "1"
  resources:
    requests:
      cpu: "2"
      memory: "16Gi"
    limits:
      cpu: "8"
      memory: "32Gi"
  nodeSelector:
    kubernetes.io/os: linux
    kubernetes.io/arch: amd64
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  weights:
    csi:
      enabled: false
    hostPath:
      enabled: true
      path: /models/hf
      mountPath: /models/hf
      type: DirectoryOrCreate

models:
  - slug: 8b-a
    replicas: 1
    port: 30003
    discoveryLabels:
      subconscious.dev/worker-name: 8b-a
  - slug: 8b-b
    replicas: 1
    port: 30004
    discoveryLabels:
      subconscious.dev/worker-name: 8b-b
  - slug: 8b-c
    replicas: 1
    port: 30005
    discoveryLabels:
      subconscious.dev/worker-name: 8b-c
  - slug: 8b-d
    replicas: 1
    port: 30006
    discoveryLabels:
      subconscious.dev/worker-name: 8b-d

secrets:
  create: true
  workerSecretName: worker-secrets
  datadogSecretName: datadog-secret
  worker:
    SGLANG_WORKER_API_KEY: "{{.Secrets.WORKER_API_KEY}}"
  datadog:
    DD_API_KEY: "{{.Secrets.DD_API_KEY}}"
